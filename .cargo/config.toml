[build]
target = "x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "linker-flavor=ld.lld"]

# Build scripts (and any gnu-targeted compilation) use the system cc linker so
# that the standard C runtime libraries are found automatically.
[target.x86_64-unknown-linux-gnu]
linker = "cc"
