# Pre-flight mobile builds: Android APK/AAB for Play internal testing and
# an iOS build headed for TestFlight.
#
# Store uploads are gated on secrets and skip cleanly when they are absent,
# so the build/validate half runs on every push touching mobile/**.
#
# Android upload (Play internal track) needs:
#   PLAY_SERVICE_ACCOUNT_JSON, LOWBAND_UPLOAD_KEYSTORE (base64),
#   LOWBAND_UPLOAD_KEYSTORE_PASSWORD, LOWBAND_UPLOAD_KEY_ALIAS,
#   LOWBAND_UPLOAD_KEY_PASSWORD
# iOS TestFlight upload needs:
#   APP_STORE_CONNECT_API_KEY_P8, APP_STORE_CONNECT_KEY_ID,
#   APP_STORE_CONNECT_ISSUER_ID, XCODE_DEVELOPMENT_TEAM
#
# NOTE (licensing): the iOS app must be dual-licensed before App Store
# distribution — AGPL-3.0 is incompatible with App Store terms. See
# docs/go-to-market.md §4. TestFlight-internal builds are fine meanwhile.

name: mobile-preflight

on:
  push:
    branches: [main]
    paths: ["mobile/**", ".github/workflows/mobile-preflight.yml"]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK + release bundle (unsigned)
        run: gradle assembleDebug bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: lowband-viewer-android
          path: |
            mobile/android/app/build/outputs/apk/debug/*.apk
            mobile/android/app/build/outputs/bundle/release/*.aab
      - name: Upload to Play internal track
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        if: env.PLAY_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.lowband.viewer
          releaseFiles: mobile/android/app/build/outputs/bundle/release/*.aab
          track: internal

  ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile/ios
    steps:
      - uses: actions/checkout@v4
      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate
      - name: Build for simulator (no signing) — compile validation
        run: |
          xcodebuild -project LowBandViewer.xcodeproj -scheme LowBandViewer \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO build
      - name: Archive + upload to TestFlight
        env:
          ASC_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.XCODE_DEVELOPMENT_TEAM }}
        if: env.ASC_KEY_P8 != ''
        run: |
          KEY_DIR="$RUNNER_TEMP/asc"
          mkdir -p "$KEY_DIR"
          echo "$ASC_KEY_P8" > "$KEY_DIR/AuthKey_$ASC_KEY_ID.p8"
          xcodebuild -project LowBandViewer.xcodeproj -scheme LowBandViewer \
            -destination generic/platform=iOS \
            -archivePath build/LowBandViewer.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_DIR/AuthKey_$ASC_KEY_ID.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive
          xcodebuild -exportArchive \
            -archivePath build/LowBandViewer.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_DIR/AuthKey_$ASC_KEY_ID.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
