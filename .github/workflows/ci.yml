# The PRD (§13) declares the bench suite the single source of truth for
# every quantitative bar — this workflow is what actually makes that true.
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Workspace tests (unit + bench gates + e2e)
        # Build on the gnu target so C deps (zstd-sys) use the runner's native
        # gcc — the musl default target would need x86_64-linux-musl-gcc, which
        # isn't installed on the runner. Neutralize the repo's machine-specific
        # host rustflags (-L/tmp/rust-libs) too.
        run: >
          cargo test --workspace
          --target x86_64-unknown-linux-gnu
          --config 'host.rustflags=[]'

  # Builds and tests the PRODUCTION voice codec against real system libopus —
  # the C dependency the local dev environment can't install. This is where
  # FR-2's libopus/DRED integration is actually compiled and exercised.
  voice-opus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libopus
        run: sudo apt-get update && sudo apt-get install -y libopus-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: opus
      - name: Test the libopus voice codec (real Opus encode/decode)
        # gnu target so the C libopus links normally; neutralize the repo's
        # machine-specific host rustflags (-L/tmp/rust-libs) on the runner.
        run: >
          cargo test -p lowbandd --features opus
          --target x86_64-unknown-linux-gnu
          --config 'host.rustflags=[]'

  # Builds and tests the PRODUCTION AV1 camera codec: rav1e encode (pure Rust)
  # + dav1d decode (system libdav1d) — the C dependency the local environment
  # can't install. This is where FR-8's AV1 roundtrip is actually exercised.
  camera-av1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libdav1d + nasm
        run: sudo apt-get update && sudo apt-get install -y libdav1d-dev nasm pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: av1
      - name: Test the AV1 camera codec (rav1e encode / dav1d decode)
        run: >
          cargo test -p lowbandd --features av1
          --target x86_64-unknown-linux-gnu
          --config 'host.rustflags=[]'
